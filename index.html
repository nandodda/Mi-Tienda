<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #2d6a4f;
    --verde-claro: #52b788;
    --crema: #fefae0;
    --naranja: #f4a261;
    --cafe: #3d1e08;
    --gris: #f0ede6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--crema);
    color: var(--cafe);
    min-height: 100vh;
  }

  header {
    background: var(--verde);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
  }

  .carrito-btn {
    background: var(--naranja);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.2s, background 0.2s;
  }
  .carrito-btn:hover { transform: scale(1.05); background: #e07b3a; }

  .badge {
    background: white;
    color: var(--naranja);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .categorias {
    display: flex;
    gap: 10px;
    padding: 20px 24px 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .categorias::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: white;
    border: 2px solid var(--verde-claro);
    color: var(--verde);
    padding: 8px 18px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .cat-btn:hover, .cat-btn.activo {
    background: var(--verde);
    color: white;
    border-color: var(--verde);
  }

  .seccion-titulo {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    padding: 16px 24px 8px;
    color: var(--verde);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    padding: 8px 24px 24px;
  }

  .producto {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .producto:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .producto-emoji {
    background: var(--gris);
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .producto-info {
    padding: 12px;
  }

  .producto-nombre {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .producto-precio {
    color: var(--verde);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 10px;
  }

  .producto-unidad {
    font-size: 0.75rem;
    color: #888;
    font-weight: 400;
  }

  .agregar-btn {
    width: 100%;
    background: var(--verde);
    color: white;
    border: none;
    padding: 8px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .agregar-btn:hover { background: var(--verde-claro); }

  .cantidad-ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .cantidad-ctrl button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--verde);
    background: white;
    color: var(--verde);
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .cantidad-ctrl button:hover { background: var(--verde); color: white; }
  .cantidad-ctrl span { font-weight: 700; font-size: 1rem; min-width: 20px; text-align: center; }

  /* Panel carrito */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
  }
  .overlay.visible { display: block; }

  .panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(400px, 100vw);
    background: white;
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
  }
  .panel.visible { transform: translateX(0); }

  .panel-header {
    background: var(--verde);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-family: 'Fraunces', serif; font-size: 1.3rem; }

  .cerrar-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
  }

  .panel-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .carrito-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--gris);
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .carrito-item-emoji { font-size: 1.8rem; }
  .carrito-item-info { flex: 1; }
  .carrito-item-nombre { font-weight: 600; font-size: 0.9rem; }
  .carrito-item-precio { color: var(--verde); font-weight: 700; font-size: 0.85rem; }
  .eliminar-item {
    background: none;
    border: none;
    color: #aaa;
    font-size: 1.2rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .eliminar-item:hover { color: #e63946; }

  .panel-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--gris);
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .total-label { font-size: 1rem; font-weight: 600; }
  .total-monto { font-family: 'Fraunces', serif; font-size: 1.6rem; color: var(--verde); }

  .campo-nombre {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--gris);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .campo-nombre:focus { border-color: var(--verde-claro); }

  .whatsapp-btn {
    width: 100%;
    background: #25D366;
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.2s;
  }
  .whatsapp-btn:hover { background: #1ebe5a; transform: scale(1.02); }
  .whatsapp-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }

  .carrito-vacio {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
  }
  .carrito-vacio .icono { font-size: 3rem; margin-bottom: 12px; }
  .carrito-vacio p { font-size: 0.95rem; }

  .nota {
    background: #fff8e1;
    border-left: 4px solid var(--naranja);
    padding: 10px 14px;
    margin: 0 24px 20px;
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: #7a5c00;
  }
</style>
</head>
<body>

<header>
  <h1>🛒 Mi Tienda</h1>
  <button class="carrito-btn" onclick="abrirCarrito()">
    🛍️ Mi pedido
    <span class="badge" id="badge">0</span>
  </button>
</header>

<div class="nota">
  📦 Haz tu Super. ¡Arma tu pedido y envíanos por WhatsApp!
</div>

<!-- Filtros por categoría -->
<div class="categorias">
  <button class="cat-btn activo" onclick="filtrar('todas', this)">Todas</button>
  <button class="cat-btn" onclick="filtrar('lacteos', this)">🥛 Lácteos</button>
  <button class="cat-btn" onclick="filtrar('frutas', this)">🍎 Frutas y Verduras</button>
  <button class="cat-btn" onclick="filtrar('carnes', this)">🥩 Carnes</button>
  <button class="cat-btn" onclick="filtrar('despensa', this)">🥫 Despensa</button>
  <button class="cat-btn" onclick="filtrar('limpieza', this)">🧹 Limpieza</button>
</div>

<!-- Productos -->
<div id="contenedor-productos"></div>

<!-- Overlay + Panel carrito -->
<div class="overlay" id="overlay" onclick="cerrarCarrito()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>🛍️ Tu pedido</h2>
    <button class="cerrar-btn" onclick="cerrarCarrito()">✕</button>
  </div>
  <div class="panel-items" id="panel-items"></div>
  <div class="panel-footer">
    <div class="total-row">
      <span class="total-label">Total estimado:</span>
      <span class="total-monto" id="total-monto">$0.00</span>
    </div>
    <input class="campo-nombre" type="text" id="campo-nombre" placeholder="Tu nombre (opcional)">
    <button class="whatsapp-btn" id="btn-enviar" onclick="enviarWhatsApp()">
      <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido por WhatsApp
    </button>
  </div>
</div>

<script>
// ============================================================
// ✏️  CONFIGURACIÓN — edita aquí tu número de WhatsApp
// ============================================================
const MI_WHATSAPP = "521XXXXXXXXXX"; // Pon tu número con código de país, sin + ni espacios
// Ejemplo México: "5218112345678"

// ============================================================
// ✏️  PRODUCTOS — agrega, edita o borra los que necesites
// ============================================================
// emoji: pon el emoji del producto
// nombre: nombre del producto
// precio: precio en números (sin $)
// unidad: "pieza", "kg", "lt", "paquete", etc.
// categoria: "lacteos", "frutas", "carnes", "despensa", "limpieza"
// ============================================================
const productos = [
  // 🥛 LÁCTEOS
  { id:1, emoji:"🥛", nombre:"Leche entera 1lt", precio:22, unidad:"pieza", categoria:"lacteos" },
  { id:2, emoji:"🧀", nombre:"Queso Oaxaca 400g", precio:85, unidad:"pieza", categoria:"lacteos" },
  { id:3, emoji:"🫙", nombre:"Yogurt natural 1kg", precio:48, unidad:"pieza", categoria:"lacteos" },
  { id:4, emoji:"🧈", nombre:"Mantequilla 190g", precio:55, unidad:"pieza", categoria:"lacteos" },

  // 🍎 FRUTAS Y VERDURAS
  { id:5, emoji:"🍅", nombre:"Tomate rojo", precio:25, unidad:"kg", categoria:"frutas" },
  { id:6, emoji:"🥑", nombre:"Aguacate", precio:18, unidad:"pieza", categoria:"frutas" },
  { id:7, emoji:"🧅", nombre:"Cebolla", precio:20, unidad:"kg", categoria:"frutas" },
  { id:8, emoji:"🌽", nombre:"Elote", precio:8, unidad:"pieza", categoria:"frutas" },
  { id:9, emoji:"🍋", nombre:"Limón", precio:0, unidad:"kg", categoria:"frutas" },

  // 🥩 CARNES
  { id:10, emoji:"🥩", nombre:"Carne molida de res", precio:120, unidad:"kg", categoria:"carnes" },
  { id:11, emoji:"🍗", nombre:"Pechuga de pollo", precio:95, unidad:"kg", categoria:"carnes" },
  { id:12, emoji:"🌭", nombre:"Salchicha", precio:45, unidad:"paquete", categoria:"carnes" },

  // 🥫 DESPENSA
  { id:13, emoji:"🥚", nombre:"Huevo blanco", precio:55, unidad:"docena", categoria:"despensa" },
  { id:14, emoji:"🍚", nombre:"Arroz blanco 1kg", precio:28, unidad:"pieza", categoria:"despensa" },
  { id:15, emoji:"🫘", nombre:"Frijol negro 1kg", precio:32, unidad:"pieza", categoria:"despensa" },
  { id:16, emoji:"🛢️", nombre:"Aceite vegetal 900ml", precio:48, unidad:"pieza", categoria:"despensa" },
  { id:17, emoji:"🍬", nombre:"Azúcar 1kg", precio:25, unidad:"pieza", categoria:"despensa" },

  // 🧹 LIMPIEZA
  { id:18, emoji:"🧴", nombre:"Detergente líquido 1lt", precio:42, unidad:"pieza", categoria:"limpieza" },
  { id:19, emoji:"🧻", nombre:"Papel higiénico 4 rollos", precio:38, unidad:"paquete", categoria:"limpieza" },
  { id:20, emoji:"🫧", nombre:"Lavatrastes 750ml", precio:30, unidad:"pieza", categoria:"limpieza" },
];

// ============================================================
// Lógica de la tienda (no necesitas editar nada abajo de aquí)
// ============================================================
let carrito = {};
let categoriaActual = "todas";

function renderProductos() {
  const contenedor = document.getElementById("contenedor-productos");
  contenedor.innerHTML = "";

  const categorias = categoriaActual === "todas"
    ? [...new Set(productos.map(p => p.categoria))]
    : [categoriaActual];

  const nombres = { lacteos:"🥛 Lácteos", frutas:"🍎 Frutas y Verduras", carnes:"🥩 Carnes", despensa:"🥫 Despensa", limpieza:"🧹 Limpieza" };

  categorias.forEach(cat => {
    const items = productos.filter(p => p.categoria === cat);
    if (!items.length) return;

    const titulo = document.createElement("h2");
    titulo.className = "seccion-titulo";
    titulo.textContent = nombres[cat] || cat;
    contenedor.appendChild(titulo);

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(p => {
      const cantidad = carrito[p.id] || 0;
      const div = document.createElement("div");
      div.className = "producto";
      div.innerHTML = `
        <div class="producto-emoji">${p.emoji}</div>
        <div class="producto-info">
          <div class="producto-nombre">${p.nombre}</div>
          <div class="producto-precio">$${p.precio.toFixed(2)} <span class="producto-unidad">/ ${p.unidad}</span></div>
          ${cantidad === 0
            ? `<button class="agregar-btn" onclick="agregar(${p.id})">+ Agregar</button>`
            : `<div class="cantidad-ctrl">
                <button onclick="quitar(${p.id})">−</button>
                <span>${cantidad}</span>
                <button onclick="agregar(${p.id})">+</button>
               </div>`
          }
        </div>
      `;
      grid.appendChild(div);
    });

    contenedor.appendChild(grid);
  });
}

function agregar(id) {
  carrito[id] = (carrito[id] || 0) + 1;
  actualizarUI();
}

function quitar(id) {
  if (carrito[id] > 1) carrito[id]--;
  else delete carrito[id];
  actualizarUI();
}

function actualizarUI() {
  const total = Object.keys(carrito).reduce((sum, id) => {
    const p = productos.find(x => x.id == id);
    return sum + p.precio * carrito[id];
  }, 0);

  const count = Object.values(carrito).reduce((s, v) => s + v, 0);
  document.getElementById("badge").textContent = count;
  document.getElementById("total-monto").textContent = "$" + total.toFixed(2);

  renderProductos();
  renderPanelCarrito();
}

function renderPanelCarrito() {
  const panel = document.getElementById("panel-items");
  const ids = Object.keys(carrito);

  if (!ids.length) {
    panel.innerHTML = `<div class="carrito-vacio"><div class="icono">🛒</div><p>Tu pedido está vacío.<br>¡Agrega productos!</p></div>`;
    return;
  }

  panel.innerHTML = ids.map(id => {
    const p = productos.find(x => x.id == id);
    const subtotal = p.precio * carrito[id];
    return `<div class="carrito-item">
      <span class="carrito-item-emoji">${p.emoji}</span>
      <div class="carrito-item-info">
        <div class="carrito-item-nombre">${p.nombre}</div>
        <div class="carrito-item-precio">${carrito[id]} × $${p.precio.toFixed(2)} = $${subtotal.toFixed(2)}</div>
      </div>
      <button class="eliminar-item" onclick="eliminarDelCarrito(${id})">🗑️</button>
    </div>`;
  }).join("");
}

function eliminarDelCarrito(id) {
  delete carrito[id];
  actualizarUI();
}

function abrirCarrito() {
  document.getElementById("overlay").classList.add("visible");
  document.getElementById("panel").classList.add("visible");
}

function cerrarCarrito() {
  document.getElementById("overlay").classList.remove("visible");
  document.getElementById("panel").classList.remove("visible");
}

function filtrar(cat, btn) {
  categoriaActual = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");
  renderProductos();
}

function enviarWhatsApp() {
  const ids = Object.keys(carrito);
  if (!ids.length) return;

  const nombre = document.getElementById("campo-nombre").value.trim();
  let mensaje = "🛒 *Pedido de" + (nombre ? " " + nombre : " cliente") + "*\n\n";

  ids.forEach(id => {
    const p = productos.find(x => x.id == id);
    mensaje += `• ${p.emoji} ${p.nombre} × ${carrito[id]} = $${(p.precio * carrito[id]).toFixed(2)}\n`;
  });

  const total = Object.keys(carrito).reduce((sum, id) => {
    const p = productos.find(x => x.id == id);
    return sum + p.precio * carrito[id];
  }, 0);

  mensaje += `\n💰 *Total: $${total.toFixed(2)}*\n\n¡Hola! Quisiera hacer este pedido 😊`;

  const url = `https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}

// Inicializar
renderProductos();
</script>
</body>
</html>
